directories:
  output: release
  buildResources: build
appId: app.finch.desktop
productName: Finch
files:
  - filter:
      - dist/**/*
      - build/icon.png
      - public/agents/**/*
      - skills/**/*
      - package.json
asarUnpack:
  - node_modules/@anthropic-ai/claude-agent-sdk-*/claude*
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  target:
    - dmg
  notarize: false
dmg:
  title: ${productName}-${version}
  background: build/bg.png
  window:
    width: 600
    height: 540
  contents:
    - x: 206
      'y': 168
      type: file
    - x: 394
      'y': 168
      type: link
      path: /Applications
win:
  icon: build/icon.png
linux:
  icon: build/icon.png
electronVersion: 42.0.1
